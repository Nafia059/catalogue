kind = "web"
previewPath = "/"
title = "Static Site"
version = "1.0.0"
id = "artifacts/static-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20379

[services.development]
run = "pnpm --filter @workspace/static-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/static-site", "run", "build" ]
publicDir = "artifacts/static-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20379"
BASE_PATH = "/"
